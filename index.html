<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cascade — Employee Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ch-mahogany:  #1C1006;
      --ch-gold:      #C9963A;
      --ch-gold-lt:   #E8B84B;
      --ch-cream:     #F7F2E8;
      --ch-parchment: #FBF7EE;
      --ch-muted:     #6B5C47;
      --ch-border:    rgba(201,150,58,0.2);
      --ch-shadow:    0 4px 24px rgba(28,16,6,0.12);
      --ch-shadow-lg: 0 12px 48px rgba(28,16,6,0.18);
      --ch-ease:      cubic-bezier(0.16, 1, 0.3, 1);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Raleway', system-ui, sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--ch-cream);
      color: var(--ch-mahogany);
      min-height: 100vh;
    }

    /* ─── LOGIN ─────────────────────────────────────────── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, var(--ch-mahogany) 0%, #2e1a08 100%);
    }
    #login-screen.hidden { display: none; }

    .login-card {
      background: var(--ch-parchment);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--ch-shadow-lg);
      text-align: center;
    }
    .login-card .wordmark {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--ch-mahogany);
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }
    .login-card .tagline {
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--ch-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .login-card h2 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--ch-gold);
      margin-bottom: 24px;
    }
    .field { text-align: left; margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ch-muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--ch-border);
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      background: white;
      color: var(--ch-mahogany);
      outline: none;
      transition: border-color 200ms;
    }
    .field input:focus { border-color: var(--ch-gold); }

    #login-error {
      font-size: 0.8rem;
      color: #c0392b;
      background: #fdecea;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 16px;
      display: none;
    }
    #login-error.visible { display: block; }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--ch-gold), var(--ch-gold-lt), var(--ch-gold));
      border: none;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ch-mahogany);
      cursor: pointer;
      transition: opacity 200ms, transform 150ms;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ─── APP SHELL ─────────────────────────────────────── */
    #app { display: none; flex-direction: column; min-height: 100vh; }
    #app.visible { display: flex; }

    .app-header {
      background: var(--ch-mahogany);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 60px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(28,16,6,0.4);
    }
    .app-header .wordmark {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--ch-cream);
      letter-spacing: 0.02em;
    }
    .app-header .wordmark span {
      color: var(--ch-gold);
      margin-left: 6px;
      font-size: 0.85rem;
      font-weight: 400;
      font-family: var(--font-body);
    }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .user-badge {
      font-size: 0.75rem;
      color: rgba(247,242,232,0.6);
      font-weight: 300;
    }
    .btn-ghost {
      background: rgba(201,150,58,0.12);
      border: 1px solid rgba(201,150,58,0.3);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--ch-gold);
      cursor: pointer;
      transition: background 200ms;
    }
    .btn-ghost:hover { background: rgba(201,150,58,0.2); }

    .app-body { display: flex; flex: 1; overflow: hidden; }

    /* ─── SIDEBAR ────────────────────────────────────────── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--ch-parchment);
      border-right: 1px solid var(--ch-border);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sidebar-section {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ch-muted);
      padding: 12px 8px 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ch-mahogany);
      cursor: pointer;
      transition: background 150ms, color 150ms;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-item:hover { background: var(--ch-cream); }
    .nav-item.active {
      background: linear-gradient(135deg, rgba(201,150,58,0.12), rgba(201,150,58,0.06));
      color: var(--ch-gold);
      font-weight: 600;
    }
    .nav-item .icon { width: 18px; text-align: center; font-size: 1rem; }

    .sidebar-add {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--ch-border);
    }
    .btn-add {
      width: 100%;
      padding: 10px;
      background: var(--ch-mahogany);
      border: none;
      border-radius: 8px;
      color: var(--ch-gold);
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 200ms;
    }
    .btn-add:hover { opacity: 0.85; }

    /* ─── MAIN CONTENT ───────────────────────────────────── */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }

    .view { display: none; }
    .view.active { display: block; }

    /* ─── PAGE HEADER ────────────────────────────────────── */
    .page-header { margin-bottom: 28px; }
    .page-header h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 600;
      color: var(--ch-mahogany);
      letter-spacing: 0.01em;
    }
    .page-header p {
      font-size: 0.85rem;
      color: var(--ch-muted);
      margin-top: 4px;
    }

    /* ─── STATS BAR ──────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: white;
      border: 1px solid var(--ch-border);
      border-radius: 12px;
      padding: 16px 20px;
      flex: 1;
      box-shadow: 0 2px 8px rgba(28,16,6,0.05);
    }
    .stat-card .label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ch-muted);
      margin-bottom: 6px;
    }
    .stat-card .value {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--ch-mahogany);
    }
    .stat-card .value.gold { color: var(--ch-gold); }

    /* ─── ROSTER TABLE ───────────────────────────────────── */
    .table-wrap {
      background: white;
      border: 1px solid var(--ch-border);
      border-radius: 12px;
      box-shadow: var(--ch-shadow);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead tr {
      background: linear-gradient(135deg, var(--ch-mahogany), #2e1a08);
    }
    thead th {
      padding: 14px 16px;
      text-align: left;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ch-gold);
    }
    tbody tr {
      border-bottom: 1px solid rgba(201,150,58,0.1);
      transition: background 150ms;
      cursor: pointer;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(201,150,58,0.04); }
    tbody td {
      padding: 14px 16px;
      font-size: 0.85rem;
      vertical-align: middle;
    }
    .td-name { font-weight: 600; color: var(--ch-mahogany); }
    .td-name small {
      display: block;
      font-weight: 300;
      font-size: 0.75rem;
      color: var(--ch-muted);
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .badge-active   { background: #e8f5e9; color: #2e7d32; }
    .badge-resigned { background: #fce4ec; color: #c62828; }
    .badge-onleave  { background: #fff8e1; color: #f57f17; }
    .badge-cleaner  { background: rgba(201,150,58,0.12); color: var(--ch-gold); }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--ch-muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }

    /* ─── DETAIL VIEW ────────────────────────────────────── */
    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      color: var(--ch-gold);
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 24px;
      transition: opacity 200ms;
    }
    .back-btn:hover { opacity: 0.7; }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 24px;
      background: white;
      border: 1px solid var(--ch-border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--ch-shadow);
    }
    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--ch-mahogany), #2e1a08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--ch-gold);
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-info h2 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--ch-mahogany);
    }
    .profile-info .meta {
      font-size: 0.82rem;
      color: var(--ch-muted);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .profile-actions { margin-left: auto; display: flex; gap: 8px; }

    .btn-edit {
      padding: 8px 20px;
      background: none;
      border: 1px solid var(--ch-gold);
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ch-gold);
      cursor: pointer;
      transition: background 200ms;
    }
    .btn-edit:hover { background: rgba(201,150,58,0.08); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    .detail-section {
      background: white;
      border: 1px solid var(--ch-border);
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(28,16,6,0.05);
    }
    .detail-section h3 {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      color: var(--ch-mahogany);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--ch-border);
    }
    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 6px 0;
      border-bottom: 1px solid rgba(201,150,58,0.06);
    }
    .field-row:last-child { border-bottom: none; }
    .field-row .fl {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ch-muted);
    }
    .field-row .fv {
      font-size: 0.85rem;
      color: var(--ch-mahogany);
      font-weight: 500;
      text-align: right;
    }
    .field-row .fv.empty { color: var(--ch-muted); font-weight: 300; font-style: italic; }

    /* ─── HISTORY TIMELINE ───────────────────────────────── */
    .history-section { grid-column: span 2; }
    .history-table-wrap { overflow-x: auto; }

    /* ─── MODAL ──────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(28,16,6,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--ch-parchment);
      border-radius: 16px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 32px;
      box-shadow: var(--ch-shadow-lg);
    }
    .modal h2 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--ch-mahogany);
      margin-bottom: 24px;
    }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .modal-grid .full { grid-column: span 2; }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--ch-border);
    }
    .field select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--ch-border);
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      background: white;
      color: var(--ch-mahogany);
      outline: none;
      transition: border-color 200ms;
      appearance: none;
    }
    .field select:focus { border-color: var(--ch-gold); }

    /* ─── LOADER ─────────────────────────────────────────── */
    .loader {
      text-align: center;
      padding: 60px 24px;
      color: var(--ch-muted);
      font-size: 0.85rem;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(201,150,58,0.2);
      border-top-color: var(--ch-gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── TOAST ──────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--ch-mahogany);
      color: var(--ch-cream);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: var(--ch-shadow-lg);
      z-index: 200;
      transform: translateY(80px);
      opacity: 0;
      transition: transform 300ms var(--ch-ease), opacity 300ms;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid #4caf50; }
    .toast.error   { border-left: 3px solid #f44336; }

    /* ─── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { padding: 20px; }
      .detail-grid { grid-template-columns: 1fr; }
      .history-section { grid-column: span 1; }
      .stats-bar { flex-wrap: wrap; }
      .modal-grid { grid-template-columns: 1fr; }
      .modal-grid .full { grid-column: span 1; }
    }
  </style>
</head>
<body>

<!-- ─── LOGIN ─────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="wordmark">Cascade Hideaway</div>
    <div class="tagline">Hotel Comfort. Home Warmth.</div>
    <h2>Employee Database</h2>
    <div id="login-error"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <button class="btn-primary" id="login-btn" onclick="handleLogin()">Sign In</button>
  </div>
</div>

<!-- ─── APP ───────────────────────────────────────────── -->
<div id="app">
  <header class="app-header">
    <div class="wordmark">Cascade<span>Employee DB</span></div>
    <div class="header-actions">
      <span class="user-badge" id="user-email"></span>
      <button class="btn-ghost" onclick="handleLogout()">Sign Out</button>
    </div>
  </header>
  <div class="app-body">
    <aside class="sidebar">
      <div class="sidebar-section">Staff</div>
      <button class="nav-item active" id="nav-roster" onclick="showRoster()">
        <span class="icon">👥</span> Staff Roster
      </button>
      <button class="nav-item" id="nav-alumni" onclick="showAlumni()">
        <span class="icon">📁</span> Alumni
      </button>
      <div class="sidebar-add">
        <button class="btn-add" onclick="openAddModal()">+ Add Employee</button>
      </div>
    </aside>
    <main class="main-content">

      <!-- ROSTER VIEW -->
      <div class="view active" id="view-roster">
        <div class="page-header">
          <h1>Staff Roster</h1>
          <p>Active employees at Cascade Hideaway</p>
        </div>
        <div class="stats-bar" id="roster-stats"></div>
        <div class="table-wrap" id="roster-table-wrap">
          <div class="loader"><div class="spinner"></div>Loading staff…</div>
        </div>
      </div>

      <!-- ALUMNI VIEW -->
      <div class="view" id="view-alumni">
        <div class="page-header">
          <h1>Alumni</h1>
          <p>Former employees — history retained</p>
        </div>
        <div class="table-wrap" id="alumni-table-wrap">
          <div class="loader"><div class="spinner"></div>Loading…</div>
        </div>
      </div>

      <!-- DETAIL VIEW -->
      <div class="view" id="view-detail">
        <button class="back-btn" id="detail-back-btn">← Back</button>
        <div id="detail-content">
          <div class="loader"><div class="spinner"></div>Loading employee…</div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- ─── ADD / EDIT MODAL ──────────────────────────────── -->
<div class="modal-overlay" id="emp-modal">
  <div class="modal">
    <h2 id="modal-title">Add Employee</h2>
    <input type="hidden" id="modal-emp-id" />
    <div class="modal-grid">
      <div class="field full">
        <label>Full Name *</label>
        <input type="text" id="f-full-name" placeholder="Honey Leyson" />
      </div>
      <div class="field">
        <label>Nickname</label>
        <input type="text" id="f-nickname" placeholder="Honey" />
      </div>
      <div class="field">
        <label>Role</label>
        <select id="f-role">
          <option value="cleaner">Cleaner</option>
          <option value="caretaker">Caretaker</option>
          <option value="maintenance">Maintenance</option>
        </select>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="f-status">
          <option value="active">Active</option>
          <option value="on_leave">On Leave</option>
          <option value="resigned">Resigned</option>
          <option value="terminated">Terminated</option>
        </select>
      </div>
      <div class="field">
        <label>Phone</label>
        <input type="text" id="f-phone" placeholder="09XXXXXXXXX" />
      </div>
      <div class="field">
        <label>Hire Date</label>
        <input type="date" id="f-hire-date" />
      </div>
      <div class="field">
        <label>End Date</label>
        <input type="date" id="f-end-date" />
      </div>
      <div class="field">
        <label>End Reason</label>
        <select id="f-end-reason">
          <option value="">— none —</option>
          <option value="resigned">Resigned</option>
          <option value="terminated">Terminated</option>
        </select>
      </div>
      <div class="field full">
        <label>Address</label>
        <input type="text" id="f-address" placeholder="GenSan, South Cotabato" />
      </div>
      <div class="field">
        <label>Telegram User ID</label>
        <input type="text" id="f-telegram" placeholder="numeric ID" />
      </div>
      <div class="field">
        <label>Rate Override (₱)</label>
        <input type="number" id="f-rate" placeholder="Leave blank for schedule" />
      </div>
      <!-- PH Compliance -->
      <div class="field">
        <label>TIN</label>
        <input type="text" id="f-tin" placeholder="000-000-000-000" />
      </div>
      <div class="field">
        <label>SSS Number</label>
        <input type="text" id="f-sss" placeholder="00-0000000-0" />
      </div>
      <div class="field">
        <label>PhilHealth</label>
        <input type="text" id="f-philhealth" placeholder="0000-0000-0000" />
      </div>
      <div class="field">
        <label>Pag-IBIG</label>
        <input type="text" id="f-pagibig" placeholder="0000-0000-0000" />
      </div>
      <div class="field full">
        <label>Notes</label>
        <input type="text" id="f-notes" placeholder="Optional notes" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-edit" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="modal-save-btn" onclick="saveEmployee()" style="width:auto;padding:10px 28px;">Save</button>
    </div>
  </div>
</div>

<!-- ─── TOAST ─────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://qkgfhsdppslwunarczeq.supabase.co';
  const SUPABASE_ANON = 'sb_publishable_JFuRYZ9csmQULcMRmHXDSg_Abo9UeCj';
  const PROPERTY_ID  = '6ae230f4-c189-4547-84b1-cb6e0b2cc9bd';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  let currentUser = null;
  let allEmployees = [];

  // ─── AUTH ────────────────────────────────────────────
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      await bootApp(session.user);
    } else {
      show('login-screen');
    }
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pwd   = document.getElementById('login-password').value;
    const btn   = document.getElementById('login-btn');
    const err   = document.getElementById('login-error');
    err.classList.remove('visible');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
    if (error) {
      err.textContent = error.message;
      err.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }
    await bootApp(data.user);
  }

  async function bootApp(user) {
    const role = user.app_metadata?.role;
    if (role !== 'admin') {
      const err = document.getElementById('login-error');
      err.textContent = 'Access denied — admin only.';
      err.classList.add('visible');
      await sb.auth.signOut();
      return;
    }
    currentUser = user;
    document.getElementById('user-email').textContent = user.email;
    hide('login-screen');
    document.getElementById('app').classList.add('visible');
    await loadRoster();
  }

  async function handleLogout() {
    await sb.auth.signOut();
    location.reload();
  }

  // ─── VIEWS ───────────────────────────────────────────
  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  function setActiveNav(id) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const el = document.getElementById(id);
    if (el) el.classList.add('active');
  }

  async function showRoster() {
    setActiveNav('nav-roster');
    showView('view-roster');
    await loadRoster();
  }

  async function showAlumni() {
    setActiveNav('nav-alumni');
    showView('view-alumni');
    await loadAlumni();
  }

  // ─── ROSTER ──────────────────────────────────────────
  async function loadRoster() {
    const wrap = document.getElementById('roster-table-wrap');
    wrap.innerHTML = '<div class="loader"><div class="spinner"></div>Loading staff…</div>';
    const { data, error } = await sb.rpc('get_active_staff', { p_property_id: PROPERTY_ID });
    if (error) { wrap.innerHTML = `<div class="empty-state"><p>Error: ${esc(error.message)}</p></div>`; return; }
    allEmployees = data || [];
    renderStats(allEmployees);
    renderRosterTable(allEmployees, wrap);
  }

  function renderStats(staff) {
    const bar = document.getElementById('roster-stats');
    const totalCleans = staff.reduce((s, e) => s + Number(e.total_cleans || 0), 0);
    bar.innerHTML = `
      <div class="stat-card">
        <div class="label">Active Staff</div>
        <div class="value">${staff.length}</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Cleans</div>
        <div class="value gold">${totalCleans}</div>
      </div>
    `;
  }

  function renderRosterTable(staff, container) {
    if (!staff.length) {
      container.innerHTML = `<div class="empty-state"><div class="icon">👤</div><p>No active staff found.</p></div>`;
      return;
    }
    const rows = staff.map(e => `
      <tr onclick="showDetail('${e.id}')">
        <td class="td-name">${esc(e.full_name)}<small>${esc(e.nickname || '')}</small></td>
        <td><span class="badge badge-cleaner">${esc(e.role)}</span></td>
        <td><span class="badge badge-active">${esc(e.employment_status)}</span></td>
        <td>${e.hire_date ? fmtDate(e.hire_date) : '—'}</td>
        <td>${e.last_clean_date ? fmtDate(e.last_clean_date) : '—'}</td>
        <td>${e.total_cleans || 0}</td>
      </tr>`).join('');
    container.innerHTML = `
      <table>
        <thead><tr>
          <th>Name</th><th>Role</th><th>Status</th><th>Hired</th><th>Last Clean</th><th>Total Cleans</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ─── ALUMNI ───────────────────────────────────────────
  async function loadAlumni() {
    const wrap = document.getElementById('alumni-table-wrap');
    wrap.innerHTML = '<div class="loader"><div class="spinner"></div>Loading…</div>';
    const { data, error } = await sb.from('employees')
      .select('*')
      .eq('property_id', PROPERTY_ID)
      .eq('is_active', false)
      .order('end_date', { ascending: false });
    if (error) { wrap.innerHTML = `<div class="empty-state"><p>Error: ${esc(error.message)}</p></div>`; return; }
    if (!data || !data.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="icon">📁</div><p>No alumni on record.</p></div>`;
      return;
    }
    const rows = data.map(e => `
      <tr onclick="showDetail('${e.id}')">
        <td class="td-name">${esc(e.full_name)}<small>${esc(e.nickname || '')}</small></td>
        <td><span class="badge badge-cleaner">${esc(e.role)}</span></td>
        <td><span class="badge badge-resigned">${esc(e.employment_status)}</span></td>
        <td>${e.hire_date ? fmtDate(e.hire_date) : '—'}</td>
        <td>${e.end_date ? fmtDate(e.end_date) : '—'}</td>
        <td>${esc(e.end_reason || '—')}</td>
      </tr>`).join('');
    wrap.innerHTML = `
      <table>
        <thead><tr>
          <th>Name</th><th>Role</th><th>Status</th><th>Hired</th><th>Left</th><th>Reason</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ─── DETAIL ───────────────────────────────────────────
  async function showDetail(empId) {
    // Set up back button depending on which view came from
    const isAlumni = document.getElementById('view-alumni').classList.contains('active');
    document.getElementById('detail-back-btn').onclick = isAlumni ? showAlumni : showRoster;

    showView('view-detail');
    const content = document.getElementById('detail-content');
    content.innerHTML = '<div class="loader"><div class="spinner"></div>Loading employee…</div>';

    const [{ data: emp, error: empErr }, { data: hist, error: histErr }] = await Promise.all([
      sb.from('employees').select('*').eq('id', empId).single(),
      sb.rpc('get_employee_history', { p_employee_id: empId })
    ]);

    if (empErr) { content.innerHTML = `<p>Error: ${esc(empErr.message)}</p>`; return; }

    const statusBadge = emp.is_active
      ? `<span class="badge badge-active">${esc(emp.employment_status)}</span>`
      : `<span class="badge badge-resigned">${esc(emp.employment_status)}</span>`;

    const histRows = (hist && hist.length)
      ? hist.map(h => `
          <tr>
            <td>${fmtDate(h.session_date)}</td>
            <td><span class="badge badge-cleaner">${esc(h.cleaning_type || '—')}</span></td>
            <td>${h.fee_amount != null ? '₱' + Number(h.fee_amount).toLocaleString() : h.effective_rate ? '₱' + Number(h.effective_rate).toLocaleString() : '—'}</td>
            <td>${h.fee_paid_at ? `<span class="badge badge-active">Paid</span>` : `<span class="badge badge-onleave">Pending</span>`}</td>
            <td style="max-width:240px;font-size:0.78rem;color:var(--ch-muted)">${esc(h.notes || '')}</td>
          </tr>`).join('')
      : '<tr><td colspan="5" style="text-align:center;color:var(--ch-muted);padding:20px">No cleaning sessions recorded.</td></tr>';

    const totalPay = (hist || []).reduce((s, h) => s + Number(h.fee_amount || h.effective_rate || 0), 0);

    const fld = (label, val) => `
      <div class="field-row">
        <span class="fl">${label}</span>
        <span class="fv ${val ? '' : 'empty'}">${val || 'not set'}</span>
      </div>`;

    content.innerHTML = `
      <div class="profile-header">
        <div class="avatar">${emp.photo_url ? `<img src="${esc(emp.photo_url)}" alt="" />` : esc((emp.nickname || emp.full_name)[0].toUpperCase())}</div>
        <div class="profile-info">
          <h2>${esc(emp.full_name)} ${emp.nickname && emp.nickname !== emp.full_name ? `<small style="font-size:1rem;font-weight:300;color:var(--ch-muted)">"${esc(emp.nickname)}"</small>` : ''}</h2>
          <div class="meta">
            ${statusBadge}
            <span class="badge badge-cleaner">${esc(emp.role)}</span>
            ${emp.phone ? `<span>📞 ${esc(emp.phone)}</span>` : ''}
            ${emp.hire_date ? `<span>Hired ${fmtDate(emp.hire_date)}</span>` : ''}
          </div>
        </div>
        <div class="profile-actions">
          <button class="btn-edit" onclick="openEditModal('${empId}')">Edit</button>
        </div>
      </div>

      <div class="detail-grid">
        <div class="detail-section">
          <h3>Employment</h3>
          ${fld('Hire Date', emp.hire_date ? fmtDate(emp.hire_date) : null)}
          ${fld('End Date', emp.end_date ? fmtDate(emp.end_date) : null)}
          ${fld('End Reason', emp.end_reason)}
          ${fld('Telegram ID', emp.telegram_user_id)}
          ${fld('Rate Override', emp.rate_override ? '₱' + emp.rate_override : null)}
          ${fld('Notes', emp.notes)}
        </div>

        <div class="detail-section">
          <h3>PH Compliance</h3>
          ${fld('TIN', emp.tin)}
          ${fld('SSS', emp.sss_number)}
          ${fld('PhilHealth', emp.philhealth_number)}
          ${fld('Pag-IBIG', emp.pagibig_number)}
          ${fld('Address', emp.address)}
        </div>

        <div class="detail-section history-section">
          <h3>Cleaning History &nbsp;
            <span style="font-size:0.82rem;font-weight:400;color:var(--ch-muted)">
              ${(hist || []).length} session${(hist || []).length !== 1 ? 's' : ''} —
              Total pay ₱${totalPay.toLocaleString()}
            </span>
          </h3>
          <div class="history-table-wrap">
            <table>
              <thead><tr>
                <th>Date</th><th>Type</th><th>Rate / Fee</th><th>Paid</th><th>Notes</th>
              </tr></thead>
              <tbody>${histRows}</tbody>
            </table>
          </div>
        </div>
      </div>`;
  }

  // ─── MODAL ────────────────────────────────────────────
  function openAddModal() {
    document.getElementById('modal-title').textContent = 'Add Employee';
    document.getElementById('modal-emp-id').value = '';
    ['full-name','nickname','phone','address','telegram','notes','tin','sss','philhealth','pagibig'].forEach(k => {
      const el = document.getElementById('f-' + k);
      if (el) el.value = '';
    });
    document.getElementById('f-role').value = 'cleaner';
    document.getElementById('f-status').value = 'active';
    document.getElementById('f-hire-date').value = '';
    document.getElementById('f-end-date').value = '';
    document.getElementById('f-end-reason').value = '';
    document.getElementById('f-rate').value = '';
    document.getElementById('emp-modal').classList.add('open');
  }

  async function openEditModal(empId) {
    const { data: emp, error } = await sb.from('employees').select('*').eq('id', empId).single();
    if (error) { toast('Failed to load employee', 'error'); return; }
    document.getElementById('modal-title').textContent = 'Edit Employee';
    document.getElementById('modal-emp-id').value = empId;
    document.getElementById('f-full-name').value = emp.full_name || '';
    document.getElementById('f-nickname').value   = emp.nickname || '';
    document.getElementById('f-role').value        = emp.role || 'cleaner';
    document.getElementById('f-status').value      = emp.employment_status || 'active';
    document.getElementById('f-phone').value       = emp.phone || '';
    document.getElementById('f-hire-date').value   = emp.hire_date || '';
    document.getElementById('f-end-date').value    = emp.end_date || '';
    document.getElementById('f-end-reason').value  = emp.end_reason || '';
    document.getElementById('f-address').value     = emp.address || '';
    document.getElementById('f-telegram').value    = emp.telegram_user_id || '';
    document.getElementById('f-rate').value        = emp.rate_override || '';
    document.getElementById('f-tin').value         = emp.tin || '';
    document.getElementById('f-sss').value         = emp.sss_number || '';
    document.getElementById('f-philhealth').value  = emp.philhealth_number || '';
    document.getElementById('f-pagibig').value     = emp.pagibig_number || '';
    document.getElementById('f-notes').value       = emp.notes || '';
    document.getElementById('emp-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('emp-modal').classList.remove('open');
  }

  async function saveEmployee() {
    const empId = document.getElementById('modal-emp-id').value;
    const payload = {
      property_id:        PROPERTY_ID,
      full_name:          document.getElementById('f-full-name').value.trim(),
      nickname:           document.getElementById('f-nickname').value.trim() || null,
      role:               document.getElementById('f-role').value,
      employment_status:  document.getElementById('f-status').value,
      is_active:          document.getElementById('f-status').value === 'active' || document.getElementById('f-status').value === 'on_leave',
      phone:              document.getElementById('f-phone').value.trim() || null,
      hire_date:          document.getElementById('f-hire-date').value || null,
      end_date:           document.getElementById('f-end-date').value || null,
      end_reason:         document.getElementById('f-end-reason').value || null,
      address:            document.getElementById('f-address').value.trim() || null,
      telegram_user_id:   document.getElementById('f-telegram').value.trim() || null,
      rate_override:      document.getElementById('f-rate').value ? Number(document.getElementById('f-rate').value) : null,
      tin:                document.getElementById('f-tin').value.trim() || null,
      sss_number:         document.getElementById('f-sss').value.trim() || null,
      philhealth_number:  document.getElementById('f-philhealth').value.trim() || null,
      pagibig_number:     document.getElementById('f-pagibig').value.trim() || null,
      notes:              document.getElementById('f-notes').value.trim() || null,
    };
    if (!payload.full_name) { toast('Full name is required', 'error'); return; }

    const btn = document.getElementById('modal-save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';

    let error;
    if (empId) {
      ({ error } = await sb.from('employees').update(payload).eq('id', empId));
    } else {
      ({ error } = await sb.from('employees').insert(payload));
    }

    btn.disabled = false; btn.textContent = 'Save';
    if (error) { toast(error.message, 'error'); return; }
    toast(empId ? 'Employee updated.' : 'Employee added.', 'success');
    closeModal();
    if (document.getElementById('view-detail').classList.contains('active') && empId) {
      await showDetail(empId);
    } else {
      await loadRoster();
    }
  }

  // ─── HELPERS ─────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    return dt.toLocaleDateString('en-PH', { year:'numeric', month:'short', day:'numeric' });
  }
  function show(id)   { document.getElementById(id).classList.remove('hidden'); }
  function hide(id)   { document.getElementById(id).classList.add('hidden'); }
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  // close modal on overlay click
  document.getElementById('emp-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('emp-modal')) closeModal();
  });
  // enter key on login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen') && !document.getElementById('login-screen').classList.contains('hidden')) {
      handleLogin();
    }
  });

  init();
</script>
</body>
</html>
